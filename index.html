<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT SMAPAT - SMPN 4 Tanjung</title>
    <style>
        /* Reset CSS */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: #f4f6f9;
        }

        /* --- HALAMAN PERATURAN (INTRO) --- */
        #intro-page {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ecf0f1;
            z-index: 10;
        }
        .intro-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        
        /* Desain Logo di Halaman Depan */
        .intro-logo {
            width: 140px;
            height: auto;
            margin-bottom: 20px;
        }
        
        .intro-box h2 {
            color: #2c3e50;
            margin-top: 0;
            border-bottom: 2px solid #3498db;
            padding-bottom: 15px;
            font-size: 24px;
        }
        .intro-box ul {
            text-align: left;
            font-size: 16px;
            color: #34495e;
            line-height: 1.6;
            margin-bottom: 30px;
            padding-left: 20px;
        }
        .intro-box li { margin-bottom: 10px; }
        .highlight { font-weight: bold; color: #e74c3c; }
        
        #btn-start {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }
        #btn-start:hover { background-color: #2ecc71; }
        
        .developer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #7f8c8d;
        }

        /* --- HALAMAN UJIAN --- */
        #header {
            display: none; 
            background-color: #2c3e50;
            color: white;
            padding: 10px 30px;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            height: 70px;
            box-sizing: border-box;
        }
        
        /* Grup Logo dan Judul di Header */
        .header-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header-logo {
            height: 50px;
            width: auto;
        }
        .title { font-size: 18px; font-weight: bold; }
        .timer-box { font-size: 20px; font-weight: bold; background: #e74c3c; padding: 5px 15px; border-radius: 5px; }
        .warning-box { font-size: 16px; font-weight: bold; color: #f1c40f; }

        #iframe-container {
            display: none; 
            height: calc(100vh - 70px);
            width: 100%;
            background-color: white;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- LAYAR BLOKIR --- */
        #overlay-block {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.95);
            color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        #overlay-block h1 { color: #e74c3c; font-size: 3rem; margin-bottom: 10px; }
        #overlay-block p { font-size: 1.2rem; max-width: 600px; }
    </style>
</head>
